name: KairoOS Build System

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Limpeza Extrema e Aumento de Memória (Swap)
        run: |
          # Limpeza total para ganhar espaço
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc "/usr/local/share/boost" /usr/lib/jvm /usr/local/stack /usr/local/share/powershell /usr/local/lib/node_modules
          docker image prune --all --force
          # Criando 8GB de memória Swap para o Soong não dar crash
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Instalando Ferramentas de Compilação
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libstdc++6 git python3 python3-pip python-is-python3 repo

      - name: Configurando o Git
        run: |
          git config --global user.email "luisfelipe@exemplo.com"
          git config --global user.name "Luis Felipe"

      - name: Inicializando Código do KairoOS (AOSP Minimalista)
        run: |
          mkdir build && cd build
          repo init -u https://android.googlesource.com/platform/manifest -b android-14.0.0_r1 --depth=1 --groups=all,-notdefault,-device,-mips,-x86
          repo sync -c -j2 --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune

      - name: Personalizando para KairoOS
        run: |
          echo "Dando identidade ao sistema..."

      - name: Compilando o Sistema (Modo Econômico)
        run: |
          cd build
          source build/envsetup.sh
          lunch aosp_arm64-eng
          # Usando apenas 2 núcleos (-j2) para economizar RAM e evitar o erro de Bootstrap
          m -j2

      - name: Salvando Resultado (Artefato)
        uses: actions/upload-artifact@v4
        with:
          name: KairoOS-Image
          path: build/out/target/product/*/system.img

