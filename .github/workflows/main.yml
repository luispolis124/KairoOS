name: KairoOS Build System (Stable Edition)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Limpeza Extrema + Swap Otimizado
        run: |
          sudo swapoff -a || true
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/lib/jvm /usr/local/stack \
            /usr/local/share/powershell /usr/local/lib/node_modules
          docker image prune --all --force || true

          # Swap maior (importante!)
          sudo rm -f /swapfile
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Instalar Dependências (Android 11)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential curl flex g++-multilib gcc-multilib git gnupg gperf \
            libncurses5 libssl-dev libxml2-utils lzop zip unzip zlib1g-dev \
            openjdk-8-jdk python-is-python3 repo rsync

      - name: Configurar Java 8 Global
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64" >> $GITHUB_ENV
          echo "PATH=/usr/lib/jvm/java-8-openjdk-amd64/bin:$PATH" >> $GITHUB_ENV
          java -version

      - name: Configurar Git
        run: |
          git config --global user.email "luisfelipe@exemplo.com"
          git config --global user.name "Luis Felipe"

      - name: Inicializar AOSP (mais estável)
        run: |
          mkdir -p build
          cd build
          repo init -u https://android.googlesource.com/platform/manifest \
            -b android-11.0.0_r1 --depth=1
          repo sync -c -j2 --force-sync --no-clone-bundle --no-tags

      - name: Cache de build (melhora MUITO)
        uses: actions/cache@v4
        with:
          path: build/out
          key: kairoos-build-${{ github.run_id }}
          restore-keys: |
            kairoos-build-

      - name: Compilar KairoOS (modo seguro)
        run: |
          cd build
          source build/envsetup.sh
          lunch aosp_arm64-eng

          # Build mais seguro pra evitar crash
          m -j1 systemimage

      - name: Verificar saída
        run: |
          ls -lh build/out/target/product/*/ || true

      - name: Salvar Resultado
        uses: actions/upload-artifact@v4
        with:
          name: KairoOS-Image
          path: build/out/target/product/*/system.img
